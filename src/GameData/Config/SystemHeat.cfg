// SystemHeat integration.
//
// Modules that generate heat output virtual BRPSystemHeatFlux{N} resources
// (one per loop ID) with DumpExcess = true so they are never throttled by lack
// of a consumer.  Radiators consume those resources; no consumer means heat is
// silently discarded.  The flux inventories live on a BRPSystemHeatMarker
// module that is dynamically added to the vessel root part on the first save.

// Resource definitions for per-loop heat-flux tokens (density = 0, ALL_VESSEL).
RESOURCE_DEFINITION:NEEDS[SystemHeat]
{ 
    name = BRPSystemHeatFlux0
    density = 0
    flowMode = ALL_VESSEL
    isTweakable = false
    isVisible = false
}

+RESOURCE_DEFINITION[BRPSystemHeatFlux0]:FIRST:NEEDS[SystemHeat] { %name = BRPSystemHeatFlux1 }
+RESOURCE_DEFINITION[BRPSystemHeatFlux0]:FIRST:NEEDS[SystemHeat] { %name = BRPSystemHeatFlux2 }
+RESOURCE_DEFINITION[BRPSystemHeatFlux0]:FIRST:NEEDS[SystemHeat] { %name = BRPSystemHeatFlux3 }
+RESOURCE_DEFINITION[BRPSystemHeatFlux0]:FIRST:NEEDS[SystemHeat] { %name = BRPSystemHeatFlux4 }
+RESOURCE_DEFINITION[BRPSystemHeatFlux0]:FIRST:NEEDS[SystemHeat] { %name = BRPSystemHeatFlux5 }
+RESOURCE_DEFINITION[BRPSystemHeatFlux0]:FIRST:NEEDS[SystemHeat] { %name = BRPSystemHeatFlux6 }
+RESOURCE_DEFINITION[BRPSystemHeatFlux0]:FIRST:NEEDS[SystemHeat] { %name = BRPSystemHeatFlux7 }
+RESOURCE_DEFINITION[BRPSystemHeatFlux0]:FIRST:NEEDS[SystemHeat] { %name = BRPSystemHeatFlux8 }
+RESOURCE_DEFINITION[BRPSystemHeatFlux0]:FIRST:NEEDS[SystemHeat] { %name = BRPSystemHeatFlux9 }

// Flux-inventory anchor module on the vessel root part.
BACKGROUND_INVENTORY:NEEDS[SystemHeat]
{
    name = BRPSystemHeatMarker
    adapter = BackgroundSystemHeatFluxInventory
}

BACKGROUND_CONVERTER:NEEDS[SystemHeat]
{
    name = ModuleSystemHeatConverter
    adapter = BackgroundSystemHeatConverter
}

BACKGROUND_CONVERTER:NEEDS[SystemHeat]
{
    name = ModuleSystemHeatHarvester
    adapter = BackgroundSystemHeatHarvester
}

BACKGROUND_CONVERTER:NEEDS[SystemHeat]
{
    name = ModuleSystemHeatAsteroidHarvester
    adapter = BackgroundSystemHeatAsteroidDrill

    UsePreparedRecipe = false
    MassResourceName = BRPSpaceObjectMass
}

BACKGROUND_CONVERTER:NEEDS[SystemHeat]
{
    name = ModuleSystemHeatCometHarvester
    adapter = BackgroundSystemHeatCometDrill

    UsePreparedRecipe = false
}

BACKGROUND_CONVERTER:NEEDS[SystemHeat]
{
    name = ModuleSystemHeatFissionReactor
    adapter = BackgroundSystemHeatFissionReactor
}

// For our purposes we can treat a fission engine just like a fission reactor.
+BACKGROUND_CONVERTER[ModuleSystemHeatFissionReactor]:FIRST:NEEDS[SystemHeat]
{
    @name = ModuleSystemHeatFissionEngine
}

BACKGROUND_CONVERTER:NEEDS[SystemHeat]
{
    name = ModuleSystemHeatRadiator
    adapter = BackgroundSystemHeatRadiator
}

BACKGROUND_CONVERTER:NEEDS[SystemHeat]
{
    name = ModuleSystemHeatExchanger
    adapter = BackgroundSystemHeatExchanger
}

// CryoTank support. Cooling uses thermal loops (no EC), so we cannot model
// partial cooling in the background. We use the persisted BoiloffOccuring
// flag to decide whether boiloff should continue while unloaded.
// OnRestore updates LastUpdateTime to prevent DoCatchup from re-applying
// boiloff that BRP already simulated.

BACKGROUND_CONVERTER:NEEDS[SystemHeat]
{
    name = ModuleSystemHeatCryoTank
    adapter = BackgroundSystemHeatCryoTank

    MaxError = 0.1
}
